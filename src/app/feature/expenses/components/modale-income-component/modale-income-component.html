<form (submit)="onSubmit($event)">
  <div class="modal-header">
    <div class="modal-title-row">
      <div class="modal-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#4fd1c5"
          stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9" />
          <line x1="12" y1="8" x2="12" y2="16" />
          <polyline points="8 11 12 7 16 11" />
        </svg>
      </div>
      <div>
        <h2 class="modal-title">Nouvelle entrée</h2>
        <p class="modal-subtitle">Enregistrer une entrée d'argent</p>
      </div>
    </div>
    <button type="button" mat-dialog-close class="btn-close" aria-label="Fermer">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    </button>
  </div>

  <mat-dialog-content>
    <div class="form-body">
      <div class="income-highlight">
        <div class="highlight-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="none"
            stroke="#4fd1c5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5" />
            <polyline points="5 12 12 5 19 12" />
          </svg>
        </div>
        <span>Entrée d'argent — vient augmenter votre solde</span>
      </div>

      <form >
        <div class="input-group">
          <label class="label">Montant</label>
          <div class="amount-wrapper">
            <span class="currency">€</span>
            <input [field]="form.amount" autocomplete="off" class="input amount-input" step="any" type="number"
              placeholder="0.00">
          </div>
        </div>
      </form>

    </div>
  </mat-dialog-content>

  <mat-dialog-actions class="modal-actions">
    <button type="button" mat-dialog-close class="btn btn-cancel">Annuler</button>
    <button type="submit" class="btn btn-submit">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14" fill="none"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="19" x2="12" y2="5" />
        <polyline points="5 12 12 5 19 12" />
      </svg>
      Enregistrer l'entrée
    </button>
  </mat-dialog-actions>
</form>
