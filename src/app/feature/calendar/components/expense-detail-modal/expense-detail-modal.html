<div class="modal-header">
  <div class="modal-title-row">
    <div class="modal-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="none"
           stroke="#4fd1c5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <line x1="10" y1="9" x2="8" y2="9"/>
      </svg>
    </div>
    <div>
      <h2 class="modal-title">{{ expense().label }}</h2>
      <p class="modal-subtitle">{{ formattedDate() }}</p>
    </div>
  </div>
  <button type="button" mat-dialog-close class="btn-close" aria-label="Fermer">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="18" y1="6" x2="6" y2="18"/>
      <line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>
</div>

<mat-dialog-content>
  <div class="amount-card">
    <div class="amount-label">Montant total</div>
    <div class="amount-value">{{ formattedAmount() }} <span class="currency">€</span></div>
  </div>

  <div class="details-grid">
    <div class="detail-item">
      <span class="detail-label">Tag</span>
      <span class="tag-badge" [ngClass]="'tag-' + expense().tag.toLowerCase()">{{ tagLabel() }}</span>
    </div>

    <div class="detail-item">
      <span class="detail-label">Statut</span>
      <span class="status-badge" [ngClass]="isProcessed() ? 'status-processed' : 'status-pending'">
        <span class="status-dot"></span>
        {{ isProcessed() ? 'Traité' : 'En attente' }}
      </span>
    </div>

    <div class="detail-item">
      <span class="detail-label">Type</span>
      <span class="type-badge" [ngClass]="expense().recurring ? 'type-recurring' : 'type-once'">
        {{ expense().recurring ? 'Récurrente' : 'Ponctuelle' }}
      </span>
    </div>

    <div class="detail-item">
      <span class="detail-label">Date</span>
      <span class="detail-value">{{ formattedDate() }}</span>
    </div>
  </div>
</mat-dialog-content>

<mat-dialog-actions class="modal-actions">
  <button type="button" mat-dialog-close class="btn btn-close-action">Fermer</button>
</mat-dialog-actions>
