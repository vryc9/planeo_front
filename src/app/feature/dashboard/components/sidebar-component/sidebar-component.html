<div class="sidebar-container">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="300" height="80">
    <defs>
      <style>
        .planeo-fill {
          fill: #4FD1C5;
        }
        .planeo-text {
          font-family: sans-serif;
          font-weight: 900;
          font-size: 42px;
        }
      </style>
    </defs>
    <g transform="translate(10, 10)">
      <rect class="planeo-fill" x="0" y="0" width="18" height="60" rx="4" />
      <circle class="planeo-fill" cx="38" cy="24" r="24" />
      <circle fill="#ffffff" cx="38" cy="24" r="10" />
      <rect fill="#ffffff" x="14" y="18" width="10" height="12" />
    </g>
    <text x="80" y="58" class="planeo-fill planeo-text">laneo</text>
  </svg>
  @for (menu of menuItems(); track menu.view) {
  <div (click)="changeView(menu)" [ngClass]="{'isActive' : menu.isActive
    }" class="menu-items">
    <div class="items">
      <span [ngClass]="{
          'svgActive' : menu.isActive
        }" class="svgIcon">
        <mat-icon class="size" [fontIcon]="menu.icon!"></mat-icon>
      </span>
      <p>{{menu.view}}</p>
    </div>
  </div>
  }
  <div class="logout-section">
    <div class="user-divider"></div>
    <button (click)="logout()" class="btn-logout-full">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
        <polyline points="16 17 21 12 16 7" />
        <line x1="21" y1="12" x2="9" y2="12" />
      </svg>
      Se déconnecter
    </button>
  </div>
</div>
