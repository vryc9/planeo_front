<div
  class="toast"
  [class.toast--success]="store.variant() === 'success'"
  [class.toast--error]="store.variant() === 'error'"
  [class.toast--visible]="store.visible()"
  role="alert"
  aria-live="polite"
>
  <div class="toast-icon">
    @if (store.variant() === 'success') {
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    } @else {
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    }
  </div>

  <div class="toast-content">
    <span class="toast-title">{{ store.title() }}</span>
    <span class="toast-description">{{ store.description() }}</span>
  </div>

  <button class="toast-close" type="button" (click)="close()" aria-label="Fermer">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <line x1="18" y1="6" x2="6" y2="18"/>
      <line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>

  <div class="toast-progress"></div>
</div>
